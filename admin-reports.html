<meta name="robots" content="noindex, nofollow">
<title>Reports | Vivy 💜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<body>

<div class="app" style="max-width:480px;margin:0 auto;position:relative;z-index:1">

    <header class="app-header">
        <h1 class="page-title">Reports</h1>
    </header>

    <div class="page-content">

        <div class="stat-grid-2">
            <div class="glass-card stat-box animate-in">
                <span class="lbl">Daily Revenue</span>
                <span class="val gold" id="statDaily">$0.00</span>
            </div>
            <div class="glass-card stat-box animate-in" style="animation-delay:0.03s">
                <span class="lbl">Weekly Revenue</span>
                <span class="val gold" id="statWeekly">$0.00</span>
            </div>
            <div class="glass-card stat-box animate-in" style="animation-delay:0.06s">
                <span class="lbl">Monthly Revenue</span>
                <span class="val gold" id="statMonthly">$0.00</span>
            </div>
            <div class="glass-card stat-box animate-in" style="animation-delay:0.09s">
                <span class="lbl">Total Revenue</span>
                <span class="val gold" id="statTotal">$0.00</span>
            </div>
            <div class="glass-card stat-box animate-in" style="animation-delay:0.12s">
                <span class="lbl">Coin Sales</span>
                <span class="val" id="statCoinSales">0</span>
            </div>
            <div class="glass-card stat-box animate-in" style="animation-delay:0.15s">
                <span class="lbl">Diamonds Generated</span>
                <span class="val verified" id="statDiamonds">0</span>
            </div>
        </div>

        <div class="section-title" style="padding:4px">Top Hosts</div>
        <section class="glass-card animate-in" id="topHosts" style="padding:4px"></section>

        <div class="section-title" style="padding:4px;margin-top:6px">Top Agencies</div>
        <section class="glass-card animate-in" id="topAgencies" style="padding:4px"></section>

    </div>
