<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chat · Vivy Host</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app-shared.css">
<style>
.app { padding-bottom: 0; display: flex; flex-direction: column; height: 100vh; }

.chat-header-photo {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    object-fit: cover;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
}

.chat-header-info { flex: 1; min-width: 0; }
.chat-header-info .name { font-size: 0.88rem; font-weight: 700; }
.chat-header-info .status { font-size: 0.68rem; color: var(--online); }
.chat-header-info .status.typing { color: var(--secondary); font-style: italic; }

.chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg-bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: var(--r-md);
    font-size: 0.84rem;
    line-height: 1.4;
}

.msg-bubble.mine {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #fff;
    border-bottom-right-radius: 4px;
}

.msg-bubble.theirs {
    align-self: flex-start;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-bottom-left-radius: 4px;
}

.chat-input-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px calc(14px + var(--safe-bottom));
    background: rgba(15, 11, 29, 0.85);
    border-top: 1px solid var(--glass-border);
    backdrop-filter: blur(18px);
}

.chat-input-bar input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    font-size: 0.86rem;
    outline: none;
}

.chat-send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
}

.chat-send-btn svg { width: 18px; height: 18px; stroke: #fff; }
</style>
</head>
<body>

<div class="app">

    <header class="app-header">
        <button type="button" class="icon-btn" id="backBtn" aria-label="Go back">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <img id="userPhoto" class="chat-header-photo skeleton" src="" alt="">
        <div class="chat-header-info">
            <div class="name" id="userName">Loading…</div>
            <div class="status" id="userStatus"></div>
        </div>
    </header>

    <div class="chat-messages" id="chatMessages">
        <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <p>Say hello 👋</p>
        </div>
    </div>

    <div class="chat-input-bar">
        <input type="text" id="messageInput" placeholder="Type a message…" maxlength="500">
        <button type="button" class="chat-send-btn" id="sendBtn" aria-label="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
    </div>

</div>

<script type="module">
import { hostSessionReady } from "./host-guard.js";
import { db } from "./firebase-config.js";
import {
    doc, getDoc, setDoc, collection, addDoc,
    query, orderBy, onSnapshot, serverTimestamp, updateDoc, increment
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { getUrlParam, goBack, showToast } from "./ui-helpers.js";

const userUid = getUrlParam("userUid");
let currentHostUid = null;
let chatId = null;
let typingTimeout = null;

document.getElementById("backBtn").addEventListener("click", () => goBack("host-messages.html"));

init();

async function init() {

    const session = await hostSessionReady;
    if (!session) return;

    currentHostUid = session.user.uid;

    if (!userUid) {

        showToast("No user specified");
        return;

    }

    chatId = [currentHostUid, userUid].sort().join("_");

    document.getElementById("sendBtn").addEventListener("click", sendMessage);

    const input = document.getElementById("messageInput");

    input.addEventListener("keydown", (e) => {

        if (e.key === "Enter") sendMessage();

    });

    input.addEventListener("input", handleTyping);

    loadUserInfo();
    listenForConversationMeta();
    listenForMessages();
    markConversationRead();

}

async function markConversationRead() {

    try {

        await setDoc(
            doc(db, "conversations", chatId),
            {
                [`unreadCount.${currentHostUid}`]: 0,
                [`lastRead.${currentHostUid}`]: serverTimestamp()
            },
            { merge: true }
        );

    }

    catch (error) {

        // Conversation doc may not exist yet (no messages sent) — fine.

    }

}

async function loadUserInfo() {

    try {

        const snap = await getDoc(doc(db, "accounts", userUid));

        const photoEl = document.getElementById("userPhoto");
        const nameEl = document.getElementById("userName");
        const statusEl = document.getElementById("userStatus");

        if (snap.exists()) {

            const user = snap.data();
            photoEl.src = user.profilePhoto || "assets/default-avatar.png";
            nameEl.textContent = user.username || "Vivy User";
            statusEl.textContent = user.isOnline ? "Online" : "Offline";

        }

        else {

            nameEl.textContent = "Vivy User";

        }

        photoEl.classList.remove("skeleton");
        nameEl.classList.remove("skeleton");

    }

    catch (error) {

        console.error("Failed to load user info:", error);

    }

}

// ======================================================
// Conversation-level realtime state: typing indicator +
// read receipts live on the conversation doc itself.
// ======================================================

function listenForConversationMeta() {

    onSnapshot(doc(db, "conversations", chatId), (snap) => {

        if (!snap.exists()) return;

        const convo = snap.data();
        const statusEl = document.getElementById("userStatus");

        if (convo.typing?.[userUid]) {

            statusEl.textContent = "typing…";
            statusEl.classList.add("typing");

        }

        else {

            statusEl.classList.remove("typing");
            // Fall back to plain online/offline (kept simple — the User
            // doc listener above already covers the base case).

        }

    }, (error) => {

        console.error("Failed to listen for conversation state:", error);

    });

}

function handleTyping() {

    setDoc(
        doc(db, "conversations", chatId),
        { [`typing.${currentHostUid}`]: true },
        { merge: true }
    ).catch(() => { /* best effort */ });

    clearTimeout(typingTimeout);

    typingTimeout = setTimeout(() => {

        setDoc(
            doc(db, "conversations", chatId),
            { [`typing.${currentHostUid}`]: false },
            { merge: true }
        ).catch(() => { /* best effort */ });

    }, 2000);

}

function listenForMessages() {

    const messagesRef = collection(db, "conversations", chatId, "messages");

    onSnapshot(query(messagesRef, orderBy("createdAt", "asc")), (snapshot) => {

        const container = document.getElementById("chatMessages");

        if (snapshot.empty) {

            return; // keep the "say hello" empty state

        }

        container.innerHTML = "";

        snapshot.forEach((docSnap) => {

            const msg = docSnap.data();
            const bubble = document.createElement("div");
            bubble.className = "msg-bubble " + (msg.senderUid === currentHostUid ? "mine" : "theirs");
            bubble.textContent = msg.text || "";
            container.appendChild(bubble);

        });

        container.scrollTop = container.scrollHeight;

        // Any message arriving while the thread is open counts as read.
        markConversationRead();

    }, (error) => {

        console.error("Failed to listen for messages:", error);

    });

}

async function sendMessage() {

    const input = document.getElementById("messageInput");
    const text = input.value.trim();

    if (!text || !currentHostUid) return;

    input.value = "";
    clearTimeout(typingTimeout);

    try {

        await setDoc(
            doc(db, "conversations", chatId),
            {
                participants: [currentHostUid, userUid],
                lastMessage: text,
                lastMessageAt: serverTimestamp(),
                lastMessageSender: currentHostUid,
                [`typing.${currentHostUid}`]: false,
                [`unreadCount.${userUid}`]: increment(1),
                [`unreadCount.${currentHostUid}`]: 0,
                [`lastRead.${currentHostUid}`]: serverTimestamp()
            },
            { merge: true }
        );

        await addDoc(
            collection(db, "conversations", chatId, "messages"),
            {
                senderUid: currentHostUid,
                text,
                createdAt: serverTimestamp()
            }
        );

    }

    catch (error) {

        console.error("Failed to send message:", error);
        showToast("Message failed to send");
        input.value = text;

    }

}
</script>

</body>
  </html>
