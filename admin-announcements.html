<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Announcements | Vivy 💜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app-shared.css">
<link rel="stylesheet" href="admin-shared.css">
</head>
<body>

<div class="app" style="max-width:480px;margin:0 auto;position:relative;z-index:1">

    <header class="app-header">
        <button type="button" class="icon-btn" id="backBtn" aria-label="Go back">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h1 class="page-title">Announcements</h1>
    </header>

    <div class="page-content" style="padding-top:12px">

        <section class="glass-card animate-in" id="announcementList" style="padding:4px"></section>

        <p class="admin-note" id="emptyState" hidden>No announcements yet. Tap + to create one.</p>

    </div>

</div>

<!-- ADD / EDIT ANNOUNCEMENT MODAL -->
<div class="admin-modal-backdrop" id="formBackdrop">
    <div class="admin-modal">
        <h3 id="formTitle">New Announcement</h3>

        <form id="announcementForm" style="display:flex;flex-direction:column;gap:12px;margin-top:12px">

            <div class="field-group">
                <label class="field-label" for="fTitle">Title</label>
                <input type="text" id="fTitle" class="field-input" placeholder="Vivy Update" required>
            </div>

            <div class="field-group">
                <label class="field-label" for="fMessage">Message</label>
                <textarea id="fMessage" class="field-input" rows="4" placeholder="What's new…" style="resize:vertical" required></textarea>
            </div>

            <div class="field-group">
                <label class="field-label">Visible To</label>
                <div style="display:flex;gap:8px">
                    <label style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--text-dim)">
                        <input type="checkbox" class="audienceBox" value="user" checked style="width:16px;height:16px;accent-color:var(--secondary)"> Users
                    </label>
                    <label style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--text-dim)">
                        <input type="checkbox" class="audienceBox" value="host" checked style="width:16px;height:16px;accent-color:var(--secondary)"> Hosts
                    </label>
                    <label style="display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--text-dim)">
                        <input type="checkbox" class="audienceBox" value="agency" checked style="width:16px;height:16px;accent-color:var(--secondary)"> Agencies
                    </label>
                </div>
            </div>

            <p class="field-error" id="formError" style="display:none;color:var(--danger);font-size:0.76rem"></p>

            <div class="modal-actions" style="margin-top:4px">
                <button type="button" class="btn btn-primary-outline" id="formCancelBtn">Cancel</button>
                <button type="submit" class="btn btn-primary-solid" id="formSaveBtn">Publish</button>
            </div>

        </form>
    </div>
</div>

<button type="button" class="admin-fab" id="addBtn" aria-label="New Announcement">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<script type="module" src="admin-announcements.js"></script>

</body>
  </html>
