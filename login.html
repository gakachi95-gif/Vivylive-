<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vivy 💜</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="login-container">

    <section class="login-card">

        <!-- Vivy Logo -->
        <header class="login-header">

            <h1 class="logo">
                <span class="heart">💜</span>
                <span class="logo-text">Vivy</span>
            </h1>

            <p class="tagline">
                Match • Call • Live • Earn
            </p>

            <h2>Welcome Back</h2>

            <p class="subtitle">
                Sign in to continue your Vivy experience.
            </p>

        </header>

        <!-- Login Form -->

        <form id="loginForm">

            <div class="input-group">

                <label for="email">
                    Email Address
                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="input-group">

                <label for="password">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter your password"
                    required>

            </div>

            <div class="login-options">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

                <a href="#">

                    Forgot Password?

                </a>

            </div>

            <button type="submit" class="btn-primary">

                Sign In

            </button>

        </form>

        <!-- Footer -->

        <footer class="login-footer">

            <p>

                Don't have an account?

            </p>

            <a href="onboarding.html" class="btn-outline">

                Create Account

            </a>

            <a href="auth.html" class="back-link">

                ← Back

            </a>

        </footer>

    </section>

</main>

</body>
                    </html>
