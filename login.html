
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login | Vivy 💜</title>
</head>
<body>

    <!-- Main Glassmorphism Container -->
    <main id="login-container" class="glass-layout">
        
        <!-- Header Section -->
        <header class="auth-header">
            <img src="logo.png" alt="Vivy Logo" class="brand-logo">
            <h1>Sign In</h1>
            <p class="subtitle">Welcome back! Sign in to continue.</p>
        </header>

        <!-- Login Form Section -->
        <section class="form-section">
            <form id="loginForm" method="POST" action="#">
                
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="name@example.com">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember"> Remember Me
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-primary-premium">Sign In</button>
            </form>
        </section>

        <!-- Bottom Navigation Section -->
        <footer class="auth-footer">
            <p class="footer-text">Don't have an account?</p>
            
            <div class="footer-actions">
                <a href="onboarding.html" class="btn-outline">Create Account</a>
                <a href="auth.html" class="btn-back">← Back</a>
            </div>
        </footer>

    </main>

</body>
</html>
