
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | Vivy 💜</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="auth-container">
        <!-- Glassmorphism Card -->
        <section class="auth-card">
            
            <!-- Branding Area -->
            <header class="auth-header">
                <img src="logo.png" alt="Vivy 💜 Logo" class="brand-logo">
                <h1>Continue to Vivy</h1>
                <p>Choose how you would like to continue.</p>
            </header>

            <!-- Action Area -->
            <div class="auth-actions">
                <!-- Primary Login Action -->
                <a href="login.html" class="btn btn-primary">
                    Login
                </a>

                <div class="divider">
                    <span>OR</span>
                </div>

                <!-- Secondary Register Action -->
                <a href="onboarding.html" class="btn btn-outline">
                    Create Account
                </a>
            </div>

            <!-- Navigation Back -->
            <footer class="auth-footer">
                <a href="index.html" class="back-link">
                    ← Back
                </a>
            </footer>

        </section>
    </main>

</body>
</html>
