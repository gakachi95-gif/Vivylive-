<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vivy 💜 | Create Account</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<main>

    <!-- Logo -->
    <header>
        <h1>💜 Vivy</h1>
    </header>

    <!-- Registration Form -->
    <section>

        <form id="onboardingForm" enctype="multipart/form-data">

            <div class="form-group">
                <label for="profilePhoto">Profile Photo</label>
                <input
                    type="file"
                    id="profilePhoto"
                    accept="image/*">
            </div>

            <div class="form-group">
                <label for="username">Username</label>

                <input
                    type="text"
                    id="username"
                    required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>

                <input
                    type="email"
                    id="email"
                    required>
            </div>

            <div class="form-group">
                <label for="country">Country</label>

                <select
                    id="country"
                    required>

                    <option value="">Select Country</option>

                    <option>Nigeria</option>
                    <option>Ghana</option>
                    <option>Kenya</option>
                    <option>South Africa</option>
                    <option>United States</option>
                    <option>Canada</option>
                    <option>United Kingdom</option>
                    <option>India</option>

                </select>

            </div>

            <div class="form-group">

                <label for="gender">Gender</label>

                <select
                    id="gender"
                    required>

                    <option value="">Select Gender</option>

                    <option>Male</option>
                    <option>Female</option>
                    <option>Other</option>

                </select>

            </div>

            <div class="form-group">

                <label for="dob">
                    Date of Birth
                </label>

                <input
                    type="date"
                    id="dob"
                    required>

            </div>

            <div class="form-group">

                <label for="password">
                    Password
                </label>

                <input
                    type="password"
                    id="password"
                    required>

            </div>

            <div class="form-group">

                <label for="confirmPassword">
                    Confirm Password
                </label>

                <input
                    type="password"
                    id="confirmPassword"
                    required>

            </div>

            <div class="form-group">

                <label for="agencyCode">

                    Agency Invitation Code
                    (Optional)

                </label>

                <input
                    type="text"
                    id="agencyCode"
                    placeholder="Leave empty if registering as a User">

            </div>

            <div class="terms-container">

                <label>

                    <input
                        type="checkbox"
                        required>

                    I agree to the Terms & Conditions

                </label>

                <label>

                    <input
                        type="checkbox"
                        required>

                    I agree to the Privacy Policy

                </label>

            </div>

            <button
                type="submit"
                class="btn-submit">

                Create Account

            </button>

        </form>

    </section>

    <footer>

        <p>

            Already have an account?

            <a href="login.html">

                Login

            </a>

        </p>

        <a href="auth.html">

            ← Back

        </a>

    </footer>

</main>

<!-- Firebase Authentication -->

<script type="module" src="auth.js"></script>

</body>
    </html>
