<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Settings | Vivy 💜</title>

<body>

<div class="app" style="max-width:480px;margin:0 auto;position:relative;z-index:1">

    <header class="app-header">
        <h1 class="page-title">Settings</h1>
    </header>

    <div class="page-content">

        <form id="settingsForm">

            <div class="section-title" style="padding:4px">Platform</div>
            <section class="glass-card animate-in" style="padding:16px;display:flex;flex-direction:column;gap:14px">

                <div class="field-group" style="margin:0">
                    <label class="field-label" for="fPlatformName">Platform Name</label>
                    <input type="text" id="fPlatformName" class="field-input" placeholder="Vivy">
                </div>

                <div style="display:flex;align-items:center;justify-content:space-between">
                    <div>
                        <div class="field-label" style="margin:0">Maintenance Mode</div>
                        <div class="admin-note" style="padding:0">Blocks all sign-ins except Admin</div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="fMaintenance">
                        <span class="track"></span>
                    </label>
                </div>

            </section>

            <div class="section-title" style="padding:4px;margin-top:6px">Withdrawal Settings</div>
            <section class="glass-card animate-in" style="padding:16px;display:flex;flex-direction:column;gap:14px">

                <div class="field-group" style="margin:0">
                    <label class="field-label" for="fMinWithdrawal">Minimum Withdrawal (Diamonds)</label>
                    <input type="number" id="fMinWithdrawal" class="field-input" min="0" placeholder="50000">
                </div>

                <div class="field-group" style="margin:0">
                    <label class="field-label" for="fCommissionRate">Agency Commission (%)</label>
                    <input type="number" id="fCommissionRate" class="field-input" min="0" max="100" step="0.1" placeholder="10">
                </div>

            </section>

            <div class="section-title" style="padding:4px;margin-top:6px">Coins</div>
            <section class="glass-card animate-in" style="padding:16px;display:flex;flex-direction:column;gap:14px">

                <div class="field-group" style="margin:0">
                    <label class="field-label" for="fBonusCoins">Global Bonus Coins (%)</label>
                    <input type="number" id="fBonusCoins" class="field-input" min="0" max="100" step="1" placeholder="0">
                </div>

                <a href="admin-coins.html" class="btn btn-primary-outline btn-block">Manage Coin Packages</a>

            </section>

            <div class="section-title" style="padding:4px;margin-top:6px">Notifications</div>
            <section class="glass-card animate-in" style="padding:16px;display:flex;flex-direction:column;gap:14px">

                <div style="display:flex;align-items:center;justify-content:space-between">
                    <span class="field-label" style="margin:0">New Signup Alerts</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="fNotifySignups" checked>
                        <span class="track"></span>
                    </label>
                </div>

                <div style="display:flex;align-items:center;justify-content:space-between">
                    <span class="field-label" style="margin:0">Transaction Alerts</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="fNotifyTx" checked>
                        <span class="track"></span>
                    </label>
                </div>

                <div style="display:flex;align-items:center;justify-content:space-between">
                    <span class="field-label" style="margin:0">Support Ticket Alerts</span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="fNotifyTickets" checked>
                        <span class="track"></span>
                    </label>
                </div>

            </section>

            <button type="submit" class="btn btn-primary-solid btn-block" id="saveBtn" style="margin-top:16px">Save Settings</button>

        </form>

    </div>

            <span class="nav-label">Management</span><span class="nav-indicator"></span>
