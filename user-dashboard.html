<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vivy 💜 | User Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="dashboard">

    <!-- ==========================
         HEADER
    =========================== -->

    <header class="dashboard-header">

        <div class="header-left">

            <div class="profile-image">

                <img
                id="userPhoto"
                src="images/default-avatar.png"
                alt="Profile">

            </div>

            <div class="profile-details">

                <h2 id="username">
                    Loading...
                </h2>

                <p id="userUid">
                    USR-000000
                </p>

            </div>

        </div>

        <div class="header-right">

            <button id="notificationBtn">

                🔔

            </button>

            <button id="settingsBtn">

                ⚙️

            </button>

        </div>

    </header>


    <!-- ==========================
         WALLET CARD
    =========================== -->

    <section class="wallet-card">

        <div>

            <small>Coin Balance</small>

            <h1 id="coinBalance">

                0 🪙

            </h1>

        </div>

        <button
        id="buyCoinsBtn"
        class="premium-button">

            Buy Coins

        </button>

    </section>


    <!-- ==========================
         QUICK ACTIONS
    =========================== -->

    <section class="quick-actions">

        <button
        id="randomMatchBtn"
        class="action-card">

            🎲

            <span>

                Random Match

            </span>

        </button>

        <button
        id="audioCallBtn"
        class="action-card">

            📞

            <span>

                Audio Call

            </span>

        </button>

        <button
        id="videoCallBtn"
        class="action-card">

            🎥

            <span>

                Video Call

            </span>

        </button>

    </section>


    <!-- ==========================
         NEW HOSTS
    =========================== -->

    <section class="dashboard-section">

        <div class="section-header">

            <h3>

                ⭐ New Hosts

            </h3>

            <a href="#">

                View All

            </a>

        </div>

        <div
        id="newHosts">

            <!-- Firebase Loads Here -->

        </div>

    </section>


    <!-- ==========================
         ONLINE HOSTS
    =========================== -->

    <section class="dashboard-section">

        <div class="section-header">

            <h3>

                🟢 Online Hosts

            </h3>

            <a href="#">

                View All

            </a>

        </div>

        <div
        id="onlineHosts">

            <!-- Firebase Loads Here -->

        </div>

    </section>

          </div><!-- ==========================
     SEARCH HOSTS
========================== -->

<section class="dashboard-section">

    <div class="search-box">

        <input
            type="text"
            id="searchHost"
            placeholder="Search Host by Username or Host UID">

        <button id="searchButton">

            🔍

        </button>

    </div>

</section>


<!-- ==========================
     ALL HOSTS
========================== -->

<section class="dashboard-section">

    <div class="section-header">

        <h3>

            🌍 Browse Hosts

        </h3>

    </div>

    <div id="allHosts">

        <!-- Firebase will load approved hosts here -->

    </div>

</section>


<!-- ==========================
     HOST CARD TEMPLATE
     (Generated by Firebase)
========================== -->

<template id="hostCardTemplate">

<div class="host-card">

    <div class="host-left">

        <img
            class="host-photo"
            src="images/default-avatar.png"
            alt="Host">

    </div>

    <div class="host-center">

        <h4 class="host-name">

            Loading...

        </h4>

        <p class="host-uid">

            HST-000000

        </p>

        <span class="host-country">

            🌍 Country

        </span>

        <span class="host-status">

            🟢 Online

        </span>

    </div>

    <div class="host-right">

        <button class="message-btn">

            💬

        </button>

        <button class="audio-btn">

            📞

        </button>

        <button class="video-btn">

            🎥

        </button>

        <button class="favorite-btn">

            ❤️

        </button>

    </div>

</div>

          </template><!-- =====================================
     BOTTOM NAVIGATION
====================================== -->

<nav class="bottom-nav">

    <a href="user-dashboard.html" class="nav-item active">

        <span class="nav-icon">🏠</span>

        <span class="nav-text">Home</span>

    </a>

    <a href="messages.html" class="nav-item">

        <span class="nav-icon">💬</span>

        <span class="nav-text">Messages</span>

    </a>

    <a href="wallet.html" class="nav-item">

        <span class="nav-icon">🪙</span>

        <span class="nav-text">Wallet</span>

    </a>

    <a href="profile.html" class="nav-item">

        <span class="nav-icon">👤</span>

        <span class="nav-text">Profile</span>

    </a>

    <a href="support.html" class="nav-item">

        <span class="nav-icon">🛟</span>

        <span class="nav-text">Support</span>

    </a>

</nav>


<!-- =====================================
     FLOATING NOTIFICATION BUTTON
====================================== -->

<button id="floatingNotification" class="floating-btn">

    🔔

</button>


<!-- =====================================
     LOADING SCREEN
====================================== -->

<div id="loadingScreen" class="loading-screen">

    <div class="loading-content">

        <h2>💜 Vivy</h2>

        <p>Loading your dashboard...</p>

    </div>

</div>


<!-- =====================================
     JAVASCRIPT
====================================== -->

<script type="module" src="firebase-config.js"></script>

<script type="module" src="auth.js"></script>

<script type="module" src="user-dashboard.js"></script>

</body>
</html>
