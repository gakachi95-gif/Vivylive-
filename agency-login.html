<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Agency Login | Vivy 💜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app-shared.css">
<style>
.login-wrap {
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 24px 20px calc(24px + var(--safe-bottom));
    position: relative;
    z-index: 1;
}

.login-hero { text-align: center; margin-bottom: 20px; }

.login-hero .badge-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 14px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 26px rgba(123, 47, 247, 0.5);
}

.login-hero .badge-icon svg { width: 30px; height: 30px; stroke: #fff; }
.login-hero h1 { font-size: 1.1rem; font-weight: 800; }
.login-hero p { font-size: 0.8rem; color: var(--text-dim); margin-top: 6px; }
</style>
</head>
<body>

<div class="login-wrap">

    <div class="login-hero animate-in">
        <div class="badge-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 9h1M9 13h1M14 9h1M14 13h1"/></svg>
        </div>
        <h1>Agency Login</h1>
        <p>Sign in with the email and password you registered with.</p>
    </div>

    <section class="glass-card animate-in" style="padding:20px">

        <form id="loginForm" style="display:flex;flex-direction:column;gap:14px">

            <div class="field-group">
                <label class="field-label" for="email">Email Address</label>
                <input type="email" id="email" class="field-input" placeholder="agency@example.com" required>
            </div>

            <div class="field-group">
                <label class="field-label" for="password">Password</label>
                <input type="password" id="password" class="field-input" placeholder="Your password" required>
            </div>

            <button type="submit" class="btn btn-primary-solid btn-block" id="loginBtn" style="margin-top:6px">Log In</button>

        </form>

        <p style="font-size:0.76rem;color:var(--text-faint);text-align:center;margin-top:16px">
            Don't have an Agency account? You'll need an Agency Registration Link from Vivy Admin.
        </p>

    </section>

</div>

<script type="module" src="agency-login.js"></script>

</body>
  </html>
