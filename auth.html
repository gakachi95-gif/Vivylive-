<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | Vivy 💜</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="auth-container">

    <section class="auth-card">

        <!-- Header -->

        <header class="auth-header">

            <h1 id="authHeading">Continue to Vivy 💜</h1>

            <p id="authSubheading">
                Choose how you would like to continue.
            </p>

        </header>

        <!-- Buttons -->

        <div class="auth-actions">

            <a href="login.html" class="btn btn-primary">
                Login
            </a>

            <div class="divider">
                <span>OR</span>
            </div>

            <a href="onboarding.html" class="btn btn-outline" id="createAccountBtn">
                Create Account
            </a>

        </div>

        <!-- Footer -->

        <footer class="auth-footer">

            <a href="index.html" class="back-link">
                ← Back
            </a>

        </footer>

    </section>

</main>

<script type="module">

import { auth } from "./firebase-config.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getHostProfile } from "./auth-service.js";

const params = new URLSearchParams(window.location.search);
const isHostFlow = params.get("role") === "host";

if (isHostFlow) {

    document.getElementById("authHeading").textContent = "Become a Vivy 💜 Host";
    document.getElementById("authSubheading").textContent =
        "Log in to your Host account, or register with your Agency Invitation.";

    const createAccountBtn = document.getElementById("createAccountBtn");
    createAccountBtn.textContent = "Register as Host";
    createAccountBtn.href = "host-register.html";

}

onAuthStateChanged(auth, async (user) => {

    if (!user) {

        return;

    }

    if (isHostFlow) {

        // Signed in already — if they have a Host account, route them
        // straight to the right place. If not, let them stay here and
        // register (a signed-in User isn't automatically a Host).
        const host = await getHostProfile(user.uid);

        if (host) {

            window.location.href =
                host.status === "approved"
                    ? "host-dashboard.html"
                    : "host-pending.html";

        }

        return;

    }

    window.location.href = "user-dashboard.html";

});

</script>

</body>
    </html>
