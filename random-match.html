<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Finding a Match · Vivy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app-shared.css">
<style>
.app {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding-bottom: 24px;
}

.match-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 26px;
    padding: 20px;
    text-align: center;
}

.match-panel { display: none; flex-direction: column; align-items: center; gap: 22px; width: 100%; }
.match-panel.active { display: flex; }

/* Searching radar */
.radar-wrap { position: relative; width: 140px; height: 140px; }

.radar-avatar {
    position: absolute;
    inset: 0;
    margin: auto;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
    box-shadow: 0 0 30px rgba(123, 47, 247, 0.6);
}

.radar-avatar svg { width: 28px; height: 28px; stroke: #fff; }

.radar-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--secondary);
    opacity: 0;
    animation: radar-pulse 2.2s ease-out infinite;
}

.radar-ring:nth-child(2) { animation-delay: 0.7s; }
.radar-ring:nth-child(3) { animation-delay: 1.4s; }

@keyframes radar-pulse {
    0% { transform: scale(0.4); opacity: 0.8; }
    100% { transform: scale(1.4); opacity: 0; }
}

.match-status-text { font-size: 0.98rem; font-weight: 600; }
.match-status-sub { font-size: 0.8rem; color: var(--text-dim); }

/* Matched host reveal */
.matched-photo-wrap { position: relative; width: 120px; height: 120px; }

#matchedHostPhoto {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--secondary);
    box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
    animation: matched-pop 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes matched-pop {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

#matchedHostName { font-size: 1.05rem; font-weight: 700; }
#matchedHostMeta { font-size: 0.78rem; color: var(--text-dim); }

.connecting-label {
    font-size: 0.8rem;
    color: var(--secondary);
    font-weight: 600;
}

/* Empty icon shared by no-hosts / no-coins panels */
.state-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: center;
}

.state-icon svg { width: 28px; height: 28px; stroke: var(--text-dim); }

.match-actions { display: flex; gap: 10px; width: 100%; padding: 0 20px; }

.match-actions .btn { flex: 1; }
</style>
</head>
<body>

<div class="app">

    <header class="app-header">
        <button type="button" class="icon-btn" id="backBtn" aria-label="Go back">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h1 class="page-title">Random Match</h1>
    </header>

    <div class="match-stage">

        <!-- SEARCHING -->
        <div class="match-panel active" id="panelSearching">

            <div class="radar-wrap">
                <span class="radar-ring"></span>
                <span class="radar-ring"></span>
                <span class="radar-ring"></span>
                <div class="radar-avatar">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                </div>
            </div>

            <div>
                <div class="match-status-text" id="searchingModeLabel">Finding you a video match…</div>
                <div class="match-status-sub">Hang tight, this only takes a moment</div>
            </div>

            <div class="match-actions">
                <button type="button" class="btn btn-primary-outline" id="cancelBtn">Cancel</button>
            </div>

        </div>

        <!-- MATCHED -->
        <div class="match-panel" id="panelMatched">

            <div class="matched-photo-wrap">
                <img id="matchedHostPhoto" src="" alt="Matched host">
            </div>

            <div>
                <div id="matchedHostName">Vivy Host</div>
                <div id="matchedHostMeta">Match found!</div>
            </div>

            <div class="connecting-label" id="connectingLabel">Connecting you now…</div>

        </div>

        <!-- NO HOSTS ONLINE -->
        <div class="match-panel" id="panelNoHosts">

            <div class="state-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 15s1.5 2 4 2 4-2 4-2"/><path d="M9 9h.01M15 9h.01"/></svg>
            </div>

            <div>
                <div class="match-status-text">No hosts online right now</div>
                <div class="match-status-sub">Try again in a moment</div>
            </div>

            <div class="match-actions">
                <button type="button" class="btn btn-primary-outline" id="cancelFromNoHostsBtn">Cancel</button>
                <button type="button" class="btn btn-primary-solid" id="retryBtn">Retry</button>
            </div>

        </div>

        <!-- NOT ENOUGH COINS -->
        <div class="match-panel" id="panelNoCoins">

            <div class="state-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9 9.5c0-1.4 1.3-2.5 3-2.5s3 1.1 3 2.5-1.3 2-3 2.5-3 1.1-3 2.5 1.3 2.5 3 2.5 3-1.1 3-2.5"/></svg>
            </div>

            <div>
                <div class="match-status-text">Not enough coins</div>
                <div class="match-status-sub" id="noCoinsSub">You need at least 100 coins to start a call</div>
            </div>

            <div class="match-actions">
                <button type="button" class="btn btn-primary-outline" id="goBackBtn">Go Back</button>
                <button type="button" class="btn btn-primary-solid" id="rechargeMatchBtn">Recharge</button>
            </div>

        </div>

    </div>

</div>

<script type="module" src="random-match.js"></script>

</body>
</html>
