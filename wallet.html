<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wallet · Vivy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app-shared.css">
<style>
.wallet-hero {
    padding: 22px 18px;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 4px;
}

.wallet-hero .lbl { font-size: 0.76rem; color: var(--text-dim); }

.wallet-hero .amt {
    font-size: 2.1rem;
    font-weight: 800;
    background: linear-gradient(135deg, #fff, var(--secondary));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.wallet-hero .coins-amt {
    font-size: 1rem;
    font-weight: 600;
    color: var(--gold);
    margin-top: 6px;
}

.wallet-actions-row { display: flex; gap: 10px; padding: 0 4px; }

.tx-icon.in { background: linear-gradient(135deg, rgba(74,222,128,0.35), rgba(74,222,128,0.15)); }
.tx-icon.out { background: linear-gradient(135deg, rgba(251,113,133,0.35), rgba(251,113,133,0.15)); }

.tx-amount { font-weight: 700; font-size: 0.86rem; }
.tx-amount.positive { color: var(--online); }
.tx-amount.negative { color: var(--danger); }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
    <defs><linearGradient id="navGradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7B2FF7"/><stop offset="100%" stop-color="#A855F7"/></linearGradient></defs>
</svg>

<div class="app">

    <header class="app-header">
        <button type="button" class="icon-btn" id="backBtn" aria-label="Go back">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h1 class="page-title">Wallet</h1>
    </header>

    <section class="glass-card animate-in wallet-hero" style="margin:16px 16px 0">
        <span class="lbl">Wallet Balance</span>
        <span class="amt">$<span id="walletBalanceAmt" class="skeleton">0.00</span></span>
        <span class="coins-amt">💜 <span id="coinBalanceAmt" class="skeleton">0</span> coins</span>
    </section>

    <div class="page-content">

        <div class="wallet-actions-row">
            <button type="button" class="btn btn-primary-solid" id="rechargeBtn">Recharge</button>
            <button type="button" class="btn btn-primary-outline" id="buyCoinsBtn">Buy Coins</button>
        </div>

        <section class="glass-card animate-in" style="animation-delay:0.05s">
            <div style="padding:14px 14px 4px;font-weight:700;font-size:0.86rem">Recent Activity</div>
            <div id="transactionsList">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>
                    <p>No transactions yet</p>
                </div>
            </div>
        </section>

    </div>

    <nav class="bottom-nav" aria-label="Primary navigation">
        <a href="user-dashboard.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
            <span class="nav-label">Home</span><span class="nav-indicator"></span>
        </a>
        <a href="messages.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span class="nav-label">Messages</span><span class="nav-indicator"></span>
        </a>
        <a href="wallet.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>
            <span class="nav-label">Wallet</span><span class="nav-indicator"></span>
        </a>
        <a href="profile.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="nav-label">Profile</span><span class="nav-indicator"></span>
        </a>
        <a href="support.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 18h.01"/><path d="M9.09 9a3 3 0 1 1 5.83 1c0 2-3 2-3 5"/><circle cx="12" cy="12" r="10"/></svg>
            <span class="nav-label">Support</span><span class="nav-indicator"></span>
        </a>
    </nav>

</div>

<script type="module">
import { authReady } from "./auth-guard.js";
import { getCurrentProfile } from "./auth-service.js";
import { db } from "./firebase-config.js";
import { collection, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { goBack, formatNumber } from "./ui-helpers.js";

document.getElementById("backBtn").addEventListener("click", () => goBack("user-dashboard.html"));
document.getElementById("rechargeBtn").addEventListener("click", () => window.location.href = "recharge.html");
document.getElementById("buyCoinsBtn").addEventListener("click", () => window.location.href = "buy-coins.html");

init();

async function init() {

    const user = await authReady;
    if (!user) return;

    try {

        const profile = await getCurrentProfile(user.uid);

        if (profile) {

            const walletEl = document.getElementById("walletBalanceAmt");
            walletEl.textContent = Number(profile.walletBalance ?? 0).toFixed(2);
            walletEl.classList.remove("skeleton");

            const coinsEl = document.getElementById("coinBalanceAmt");
            coinsEl.textContent = formatNumber(profile.coins ?? 0);
            coinsEl.classList.remove("skeleton");

        }

        // Completed calls double as the wallet's transaction history —
        // coin spend/earn events are recorded there (see call.html).
        const snapshot = await getDocs(
            query(
                collection(db, "calls"),
                where("callerUid", "==", user.uid),
                orderBy("startTime", "desc"),
                limit(20)
            )
        );

        if (!snapshot.empty) {

            const listEl = document.getElementById("transactionsList");
            listEl.innerHTML = "";

            snapshot.forEach((docSnap) => {

                const call = docSnap.data();
                const row = document.createElement("div");
                row.className = "list-card";
                row.innerHTML = `
                    <span class="list-icon-circle tx-icon out">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            ${call.callType === "video"
                                ? '<path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>'
                                : '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>'}
                        </svg>
                    </span>
                    <div class="list-text">
                        <div class="list-title">${call.callType === "video" ? "Video" : "Audio"} call</div>
                        <div class="list-subtitle">${call.duration ? Math.round(call.duration) + "s" : ""}</div>
                    </div>
                    <div class="tx-amount negative">-${formatNumber(call.coinsSpent ?? 0)}</div>
                `;
                listEl.appendChild(row);

            });

        }

    }

    catch (error) {

        console.error("Failed to load wallet:", error);

    }

}
</script>

</body>
  </html>
