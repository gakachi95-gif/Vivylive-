<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Notifications · Vivy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app-shared.css">
<style>
.notif-icon.gift { background: linear-gradient(135deg, rgba(251,191,36,0.4), rgba(251,191,36,0.15)); }
.notif-icon.system { background: linear-gradient(135deg, rgba(56,189,248,0.4), rgba(56,189,248,0.15)); }
.notif-unread { background: rgba(168,85,247,0.06); }
</style>
</head>
<body>

<div class="app">

    <header class="app-header">
        <button type="button" class="icon-btn" id="backBtn" aria-label="Go back">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h1 class="page-title">Notifications</h1>
    </header>

    <div class="page-content">
        <section class="glass-card animate-in" id="notificationsCard">
            <div id="notificationsList">
                <div class="empty-state">
                    <p>Loading notifications…</p>
                </div>
            </div>
        </section>
    </div>

</div>

<script type="module">
import { authReady } from "./auth-guard.js";
import { db } from "./firebase-config.js";
import { collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { goBack } from "./ui-helpers.js";

document.getElementById("backBtn").addEventListener("click", () => goBack("user-dashboard.html"));

init();

async function init() {

    const user = await authReady;
    if (!user) return;

    const listEl = document.getElementById("notificationsList");

    try {

        const snapshot = await getDocs(
            query(
                collection(db, "accounts", user.uid, "notifications"),
                orderBy("createdAt", "desc")
            )
        );

        if (snapshot.empty) {

            listEl.innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    <p>You're all caught up</p>
                </div>
            `;
            return;

        }

        listEl.innerHTML = "";

        snapshot.forEach((docSnap) => {

            const n = docSnap.data();
            const row = document.createElement("div");
            row.className = "list-card" + (n.read ? "" : " notif-unread");
            row.innerHTML = `
                <span class="list-icon-circle notif-icon ${n.type === "gift" ? "gift" : "system"}">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                </span>
                <div class="list-text">
                    <div class="list-title">${n.title || "Vivy"}</div>
                    <div class="list-subtitle">${n.body || ""}</div>
                </div>
            `;
            listEl.appendChild(row);

        });

    }

    catch (error) {

        console.error("Failed to load notifications:", error);

        listEl.innerHTML = `
            <div class="empty-state"><p>Couldn't load notifications right now.</p></div>
        `;

    }

}
</script>

</body>
</html>
