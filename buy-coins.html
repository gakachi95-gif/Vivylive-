<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Buy Coins · Vivy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app-shared.css">
<style>
.balance-strip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
}

.balance-strip .lbl { font-size: 0.76rem; color: var(--text-dim); }
.balance-strip .amt { font-size: 1.1rem; font-weight: 700; color: var(--gold); }

.coin-packages {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.coin-package {
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.14s ease, border-color 0.2s ease;
    position: relative;
}

.coin-package:active { transform: scale(0.96); }

.coin-package.best-value { border-color: var(--gold); }

.badge-best {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: #1a1035;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 999px;
}

.coin-package .coin-qty {
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--text);
}

.coin-package .coin-price {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 4px;
}
</style>
</head>
<body>

<div class="app">

    <header class="app-header">
        <button type="button" class="icon-btn" id="backBtn" aria-label="Go back">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h1 class="page-title">Buy Coins</h1>
    </header>

    <section class="glass-card animate-in balance-strip" style="margin:16px 16px 0">
        <span class="lbl">Current Balance</span>
        <span class="amt">💜 <span id="coinBalanceAmt" class="skeleton">0</span></span>
    </section>

    <div class="page-content">

        <div class="coin-packages" id="coinPackages"></div>

        <p style="font-size:0.7rem;color:var(--text-faint);text-align:center;padding:0 8px">
            Secure payment powered by Paystack. Coins are added to your balance immediately after payment is confirmed.
        </p>

    </div>

</div>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script type="module">
import { authReady } from "./auth-guard.js";
import { getCurrentProfile } from "./auth-service.js";
import { db } from "./firebase-config.js";
import { collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { showToast, goBack, formatNumber, formatUsd } from "./ui-helpers.js";

// ======================================================
// Paystack public key
// NOTE: this is the PUBLIC key only — safe to expose client-side.
// The secret key lives only on the Render server
// (see server/services/paystack.js) and never reaches the browser.
//
// Packages now come from the SAME "coinPackages" collection
// admin-coins.js manages and recharge.html reads — this page no
// longer keeps its own separate hardcoded price list. Crediting
// is server-verified the same way too (see server/routes/verify.js)
// instead of trusting the client.
// ======================================================
const PAYSTACK_PUBLIC_KEY = "pk_live_fb16be027bb5f97047135db78046d6c9249912b3";

// Same Render service recharge.html calls — update after deploying
// (see render.yaml / server/README notes).
const PAYMENT_SERVER_URL = "https://my-render-url.onrender.com";

async function verifyPaystackTransaction(reference) {

    const idToken = await currentUser.getIdToken();

    const response = await fetch(`${PAYMENT_SERVER_URL}/verify-payment`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${idToken}`
        },
        body: JSON.stringify({ reference })
    });

    const json = await response.json();

    if (!response.ok) {

        throw new Error(json.message || "Payment could not be verified.");

    }

    return json;

}

let currentUser = null;
let currentProfile = null;
let localRate = null;

document.getElementById("backBtn").addEventListener("click", () => goBack("wallet.html"));

init();

async function init() {

    currentUser = await authReady;
    if (!currentUser) return;

    try {

        currentProfile = await getCurrentProfile(currentUser.uid);

        const el = document.getElementById("coinBalanceAmt");
        el.textContent = formatNumber(currentProfile?.coins ?? 0);
        el.classList.remove("skeleton");

        await loadLocalRate();
        await renderPackages();

    }

    catch (error) {

        console.error("Failed to load buy-coins screen:", error);
        showToast("Couldn't load Coin packages.");

    }

}

// Same lookup recharge.html uses — USD stays the base price,
// this only adds a local-currency estimate underneath it.
async function loadLocalRate() {

    const country = currentProfile?.country;
    if (!country) return;

    try {

        const snap = await getDocs(query(collection(db, "exchangeRates"), where("country", "==", country)));
        const match = snap.docs.map((d) => ({ id: d.id, ...d.data() })).find((rate) => rate.enabled !== false);

        if (match) localRate = match;

    }

    catch (error) {

        console.error("Failed to load exchange rate:", error);

    }

}

function localPriceLabel(priceUsd) {

    if (!localRate || !localRate.rateToUsd) return "";

    const converted = priceUsd * Number(localRate.rateToUsd);
    const formatted = converted.toLocaleString(undefined, { maximumFractionDigits: 2 });

    return `≈ ${localRate.symbol || ""}${formatted} ${localRate.currencyCode || ""}`;

}

async function renderPackages() {

    const container = document.getElementById("coinPackages");
    container.innerHTML = "";

    const snap = await getDocs(query(collection(db, "coinPackages"), orderBy("priceUsd", "asc")));

    const packages = snap.docs
        .map((d) => ({ id: d.id, ...d.data() }))
        .filter((pkg) => pkg.enabled !== false);

    packages.forEach((pkg) => {

        const localLabel = localPriceLabel(pkg.priceUsd);

        const el = document.createElement("div");
        el.className = "glass-card coin-package" + (pkg.best ? " best-value" : "");
        el.innerHTML = `
            ${pkg.best ? '<span class="badge-best">Best Value</span>' : ""}
            <div class="coin-qty">💜 ${formatNumber(pkg.coins)}${pkg.bonus ? ` <span style="color:var(--gold);font-weight:600">+${formatNumber(pkg.bonus)}</span>` : ""}</div>
            <div class="coin-price">${formatUsd(pkg.priceUsd)}</div>
            ${localLabel ? `<div style="font-size:0.66rem;color:var(--text-faint)">${localLabel}</div>` : ""}
        `;
        el.addEventListener("click", () => startPayment(pkg, el));
        container.appendChild(el);

    });

}

// ------------------------------------------------------
// Opens the real Paystack checkout for the tapped package.
// Coins are ONLY credited once verifyPaystackTransaction (a
// Cloud Function) has re-verified the reference server-side —
// tapping a package never credits anything by itself.
// ------------------------------------------------------

function startPayment(pkg, el) {

    if (!currentUser) return;

    el.style.pointerEvents = "none";
    el.style.opacity = "0.6";

    const handler = PaystackPop.setup({

        key: PAYSTACK_PUBLIC_KEY,
        email: currentUser.email || `${currentUser.uid}@vivy.app`,
        amount: Math.round(pkg.priceUsd * 100), // smallest currency unit
        currency: "USD",
        ref: `vivy_${currentUser.uid}_${Date.now()}`,

        metadata: {
            uid: currentUser.uid,
            packageId: pkg.id,
            country: currentProfile?.country || null,
            exchangeRateUsed: localRate?.rateToUsd || null
        },

        callback: (response) => {

            handlePaymentSuccess(pkg, response, el);

        },

        onClose: () => {

            el.style.pointerEvents = "";
            el.style.opacity = "";

        }

    });

    handler.openIframe();

}

async function handlePaymentSuccess(pkg, response, el) {

    try {

        const result = await verifyPaystackTransaction(response.reference);
        const totalCoins = result.totalCoins ?? (Number(pkg.coins) + Number(pkg.bonus || 0));

        const balanceEl = document.getElementById("coinBalanceAmt");
        const current = Number(balanceEl.textContent.replace(/,/g, "")) || 0;
        balanceEl.textContent = formatNumber(current + totalCoins);

        showToast(`+${formatNumber(totalCoins)} coins added!`);

    }

    catch (error) {

        console.error("Payment verification failed:", error);
        showToast("Payment received but verification failed — contact support with your reference.");

    }

    finally {

        el.style.pointerEvents = "";
        el.style.opacity = "";

    }

}
</script>

</body>
</html>
