<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Call · Vivy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app-shared.css">
<style>
body { background: #0A0714; }
body::before { display: none; }

.app {
    max-width: 480px;
    padding-bottom: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
}

.call-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: blur(28px) brightness(0.45);
    transform: scale(1.15);
    z-index: 0;
}

.call-bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(10,7,20,0.55) 0%, rgba(10,7,20,0.75) 60%, rgba(10,7,20,0.95) 100%);
}

/* ---- Top bar ---- */
.call-topbar {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: calc(16px + var(--safe-top)) 16px 8px;
}

.call-duration-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--glass-border);
    font-size: 0.78rem;
    font-weight: 600;
}

.live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--danger);
    animation: live-blink 1.2s ease-in-out infinite;
}

@keyframes live-blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

.coin-ticker {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
    border: 1px solid var(--glass-border);
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--gold);
}

/* ---- Center stage ---- */
.call-stage {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 20px;
    text-align: center;
}

.call-panel { display: none; flex-direction: column; align-items: center; gap: 18px; }
.call-panel.active { display: flex; }

.call-avatar-wrap { position: relative; width: 130px; height: 130px; }

#callHostPhoto {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255,255,255,0.25);
}

.pulse-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid var(--secondary);
    opacity: 0;
    animation: radar-pulse 2.2s ease-out infinite;
}

.pulse-ring:nth-child(2) { animation-delay: 0.7s; }
.pulse-ring:nth-child(3) { animation-delay: 1.4s; }

@keyframes radar-pulse {
    0% { transform: scale(0.75); opacity: 0.7; }
    100% { transform: scale(1.5); opacity: 0; }
}

#callHostName { font-size: 1.15rem; font-weight: 700; color: #fff; }
#callStatusText { font-size: 0.84rem; color: var(--text-dim); }

.call-summary-card {
    padding: 22px;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.call-summary-card .sum-title { font-size: 1rem; font-weight: 700; }
.call-summary-card .sum-row { font-size: 0.8rem; color: var(--text-dim); }

/* ---- Bottom controls ---- */
.call-controls {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 20px 20px calc(32px + var(--safe-bottom));
}

.call-ctrl-btn {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.18);
    cursor: pointer;
    transition: transform 0.14s ease, background 0.2s ease;
}

.call-ctrl-btn:active { transform: scale(0.9); }
.call-ctrl-btn.active-toggle { background: #fff; }
.call-ctrl-btn.active-toggle svg { stroke: #1a1035; }

.call-ctrl-btn svg { width: 22px; height: 22px; stroke: #fff; }

.end-call-btn {
    width: 62px;
    height: 62px;
    background: var(--danger);
    box-shadow: 0 8px 24px rgba(251, 113, 133, 0.5);
}

.end-call-btn svg { width: 26px; height: 26px; }
</style>
</head>
<body>

<div class="app">

    <div class="call-bg" id="callBg"></div>

    <div class="call-topbar">
        <div class="call-duration-pill">
            <span class="live-dot"></span>
            <span id="callTimer">00:00</span>
        </div>
        <div class="coin-ticker">
            💜 <span id="coinTicker">--</span>
        </div>
    </div>

    <div class="call-stage">

        <!-- CONNECTING -->
        <div class="call-panel active" id="panelConnecting">
            <div class="call-avatar-wrap">
                <span class="pulse-ring"></span>
                <span class="pulse-ring"></span>
                <span class="pulse-ring"></span>
                <img id="callHostPhotoConnecting" src="" alt="" style="width:130px;height:130px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.25)">
            </div>
            <div>
                <div id="connectingHostName" style="font-size:1.15rem;font-weight:700;color:#fff">Connecting…</div>
                <div id="callStatusText">Connecting call…</div>
            </div>
        </div>

        <!-- CONNECTED (video shows bg photo; audio shows centered avatar) -->
        <div class="call-panel" id="panelConnected">
            <div class="call-avatar-wrap" id="connectedAvatarWrap">
                <span class="pulse-ring"></span>
                <img id="callHostPhoto" src="" alt="">
            </div>
            <div>
                <div id="callHostName">Vivy Host</div>
                <div id="connectedStatusText" style="font-size:0.84rem;color:var(--online)">In call</div>
            </div>
        </div>

        <!-- ENDED SUMMARY -->
        <div class="call-panel" id="panelEnded">
            <div class="glass-card call-summary-card">
                <div class="sum-title" id="endedTitle">Call Ended</div>
                <div class="sum-row" id="endedDuration">Duration: 0:00</div>
                <div class="sum-row" id="endedCoins">Coins spent: 0</div>
            </div>
        </div>

    </div>

    <div class="call-controls" id="callControls">
        <button type="button" class="call-ctrl-btn" id="muteBtn" aria-label="Mute">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><path d="M12 19v4M8 23h8"/></svg>
        </button>
        <button type="button" class="call-ctrl-btn" id="giftBtn" aria-label="Send gift">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="4" rx="1"/><path d="M12 8v13"/><path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"/><path d="M7.5 8a2.5 2.5 0 0 1 0-5C11 3 12 8 12 8s1-5 4.5-5a2.5 2.5 0 0 1 0 5"/></svg>
        </button>
        <button type="button" class="call-ctrl-btn end-call-btn" id="endCallBtn" aria-label="End call">
            <svg viewBox="0 0 24 24" fill="#fff" stroke="none"><path d="M21.5 15.9l-3.8-1.6a1.5 1.5 0 0 0-1.7.4l-1.6 2a13 13 0 0 1-5.6-5.6l2-1.6a1.5 1.5 0 0 0 .4-1.7L9.6 3.9A1.5 1.5 0 0 0 8.2 3H4.5A1.5 1.5 0 0 0 3 4.6C3.4 13.3 10.7 20.6 19.4 21a1.5 1.5 0 0 0 1.6-1.5v-3.7a1.5 1.5 0 0 0-1-1.4z" transform="rotate(135 12 12)"/></svg>
        </button>
        <button type="button" class="call-ctrl-btn" id="videoToggleBtn" aria-label="Toggle camera">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
        </button>
        <button type="button" class="call-ctrl-btn" id="speakerBtn" aria-label="Speaker">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
        </button>
    </div>

</div>

<script src="vendor/ZegoExpressWebRTC-3.12.0.js"></script>

<script type="module" src="call.js"></script>

</body>
</html>
