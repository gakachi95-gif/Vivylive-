<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Support | Vivy 💜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app-shared.css">
<link rel="stylesheet" href="admin-shared.css">
</head>
<body>

<div class="app" style="max-width:480px;margin:0 auto;position:relative;z-index:1">

    <header class="app-header">
        <button type="button" class="icon-btn" id="backBtn" aria-label="Go back">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h1 class="page-title">Support Tickets</h1>
    </header>

    <section class="glass-card animate-in admin-search" style="margin:12px 16px 0">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search subject or UID">
    </section>

    <div class="filter-tabs" style="margin:10px 16px 0" id="filterTabs">
        <button type="button" class="filter-tab active" data-filter="open">Open</button>
        <button type="button" class="filter-tab" data-filter="closed">Closed</button>
        <button type="button" class="filter-tab" data-filter="all">All</button>
    </div>

    <div class="page-content" style="padding-top:10px">

        <p class="admin-note" id="resultCount"></p>

        <section class="glass-card animate-in" id="ticketList" style="padding:4px"></section>

        <p class="admin-note" id="emptyState" hidden>No tickets found.</p>

    </div>

</div>

<!-- TICKET DETAIL / REPLY MODAL -->
<div class="admin-modal-backdrop" id="ticketBackdrop">
    <div class="admin-modal">
        <h3 id="ticketSubject">Subject</h3>
        <p id="ticketMeta" style="font-size:0.72rem;color:var(--text-faint);margin-top:2px"></p>
        <p id="ticketMessage" style="margin-top:10px"></p>

        <div id="existingReplyWrap" hidden style="margin-top:12px;padding:12px;background:rgba(168,85,247,0.12);border-radius:12px">
            <p style="font-size:0.7rem;color:var(--text-faint);margin-bottom:4px">Admin Reply</p>
            <p id="existingReply" style="font-size:0.82rem"></p>
        </div>

        <div class="field-group" style="margin-top:14px">
            <label class="field-label" for="replyInput">Reply</label>
            <textarea id="replyInput" class="field-input" rows="3" placeholder="Type your reply…" style="resize:vertical"></textarea>
        </div>

        <div class="modal-actions">
            <button type="button" class="btn btn-primary-outline" id="closeTicketBtn">Close Ticket</button>
            <button type="button" class="btn btn-primary-solid" id="sendReplyBtn">Send Reply</button>
        </div>
        <button type="button" class="btn btn-primary-outline btn-block" id="dismissTicketBtn" style="margin-top:10px">Dismiss</button>
    </div>
</div>

<script type="module" src="admin-support.js"></script>

</body>
  </html>
