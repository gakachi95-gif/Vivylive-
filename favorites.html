<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Favorites · Vivy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app-shared.css">
<style>
.fav-photo-wrap { position: relative; flex-shrink: 0; cursor: pointer; }

.fav-photo {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    object-fit: cover;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
}

.fav-online-dot {
    position: absolute;
    bottom: 1px;
    right: 1px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--online);
    border: 2px solid var(--bg-bottom);
    display: none;
}

.fav-online-dot.online { display: block; }

.fav-name { cursor: pointer; }

.fav-actions { display: flex; gap: 6px; flex-shrink: 0; }

.fav-mini-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    cursor: pointer;
}

.fav-mini-btn svg { width: 16px; height: 16px; stroke: #fff; }

.fav-mini-btn.remove svg { stroke: var(--danger); }
</style>
</head>
<body>

<div class="app">

    <header class="app-header">
        <button type="button" class="icon-btn" id="backBtn" aria-label="Go back">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h1 class="page-title">Favorites</h1>
    </header>

    <div class="page-content">
        <section class="glass-card animate-in" id="favoritesCard">
            <div id="favoritesList">
                <div class="empty-state"><p>Loading favorites…</p></div>
            </div>
        </section>
    </div>

</div>

<script type="module" src="favorites.js"></script>

</body>
</html>
