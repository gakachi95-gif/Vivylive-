<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Recharge · Vivy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app-shared.css">
<style>
.balance-strip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
}

.balance-strip .lbl { font-size: 0.76rem; color: var(--text-dim); }
.balance-strip .amt { font-size: 1.1rem; font-weight: 700; color: var(--gold); }

.package-list { display: flex; flex-direction: column; gap: 10px; }

.coin-package {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
    cursor: pointer;
    transition: transform 0.14s ease, border-color 0.2s ease;
    position: relative;
}

.coin-package:active { transform: scale(0.98); }
.coin-package.selected { border-color: var(--secondary); background: rgba(168,85,247,0.12); }

.coin-package-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, rgba(251,191,36,0.35), rgba(251,191,36,0.15));
    font-size: 1.2rem;
}

.coin-package-text { flex: 1; min-width: 0; }
.coin-package-coins { font-size: 0.92rem; font-weight: 700; }
.coin-package-bonus { font-size: 0.72rem; color: var(--gold); font-weight: 600; margin-top: 2px; }
.coin-package-price { font-size: 1rem; font-weight: 800; flex-shrink: 0; }

.badge-best {
    position: absolute;
    top: -8px;
    right: 12px;
    background: var(--gold);
    color: #1a1035;
    font-size: 0.58rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 999px;
}

.order-summary {
    padding: 16px;
    display: none;
    flex-direction: column;
    gap: 8px;
}

.order-summary.show { display: flex; }

.order-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    color: var(--text-dim);
}

.order-row.total {
    font-size: 0.94rem;
    font-weight: 700;
    color: var(--text);
    padding-top: 8px;
    border-top: 1px solid var(--glass-border);
}

.order-row.bonus-row { color: var(--gold); }
</style>
</head>
<body>

<div class="app">

    <header class="app-header">
        <button type="button" class="icon-btn" id="backBtn" aria-label="Go back">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h1 class="page-title">Recharge Coins</h1>
    </header>

    <section class="glass-card animate-in balance-strip" style="margin:16px 16px 0">
        <span class="lbl">Current Coin Balance</span>
        <span class="amt">💜 <span id="coinBalanceAmt" class="skeleton">0</span></span>
    </section>

    <div class="page-content">

        <div class="package-list" id="packageList"></div>

        <section class="glass-card animate-in order-summary" id="orderSummary">
            <div class="order-row">
                <span>Coins</span>
                <span id="summaryCoins">0</span>
            </div>
            <div class="order-row bonus-row" id="summaryBonusRow" hidden>
                <span>Bonus Coins</span>
                <span id="summaryBonus">+0</span>
            </div>
            <div class="order-row total">
                <span>Total Coins</span>
                <span id="summaryTotal">0</span>
            </div>
        </section>

        <button type="button" class="btn btn-primary-solid" id="payBtn" disabled style="opacity:0.5">
            Select a package
        </button>

        <p style="font-size:0.68rem;color:var(--text-faint);text-align:center;padding:0 8px">
            Secure payment powered by Paystack. Coins are added to your balance immediately after payment is confirmed.
        </p>

    </div>

</div>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script type="module">
import { authReady } from "./auth-guard.js";
import { getCurrentProfile } from "./auth-service.js";
import { db } from "./firebase-config.js";
import { collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { showToast, goBack, formatNumber, formatUsd } from "./ui-helpers.js";

// ======================================================
// Paystack public key
// NOTE: this is the PUBLIC key only — safe to expose client-side.
// The secret key lives only on the Render server
// (see server/services/paystack.js) and never reaches the browser.
// ======================================================
const PAYSTACK_PUBLIC_KEY = "pk_live_fb16be027bb5f97047135db78046d6c9249912b3";

// ======================================================
// Payment server base URL.
// The Vivy payment backend used to be a Firebase Cloud
// Function; it's now the Express server in /server deployed on
// Render (see render.yaml). A static GitHub Pages site has no
// environment variables of its own, so this URL is set here —
// update it once your Render service is live.
// ======================================================
const PAYMENT_SERVER_URL = "https://vivylive-payment.onrender.com";

// Packages come from the SAME "coinPackages" collection Admin
// manages in admin-coins.js — nothing hardcoded/duplicated here
// anymore. Exchange rates come from the SAME "exchangeRates"
// collection admin-exchange-rates.js manages.
async function verifyPaystackTransaction(reference) {

    const idToken = await currentUser.getIdToken();

    const response = await fetch(`${PAYMENT_SERVER_URL}/verify-payment`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${idToken}`
        },
        body: JSON.stringify({ reference })
    });

    const json = await response.json();

    if (!response.ok) {

        throw new Error(json.message || "Payment could not be verified.");

    }

    return json;

}

let currentUser = null;
let currentProfile = null;
let localRate = null; // matching enabled exchangeRates doc, or null if none/USD
let packages = [];
let selectedPackage = null;

document.getElementById("backBtn").addEventListener("click", () => goBack("wallet.html"));

init();

async function init() {

    currentUser = await authReady;
    if (!currentUser) return;

    try {

        currentProfile = await getCurrentProfile(currentUser.uid);

        const el = document.getElementById("coinBalanceAmt");
        el.textContent = formatNumber(currentProfile?.coins ?? 0);
        el.classList.remove("skeleton");

        await loadLocalRate();
        await loadPackages();

    }

    catch (error) {

        console.error("Failed to load recharge screen:", error);
        showToast("Couldn't load Coin packages.");

    }

    document.getElementById("payBtn").addEventListener("click", startPayment);

}

// ------------------------------------------------------
// USD stays the ONLY base currency Coin Packages are priced
// in. This just looks up an enabled exchangeRates doc whose
// country matches the account's country so the price can also
// be SHOWN in the user's local currency — the amount actually
// charged through Paystack below is still the USD price, so
// every user receives exactly the same Coins for the same
// package regardless of where they're paying from.
// ------------------------------------------------------

async function loadLocalRate() {

    const country = currentProfile?.country;
    if (!country) return;

    try {

        const snap = await getDocs(query(collection(db, "exchangeRates"), where("country", "==", country)));
        const match = snap.docs.map((d) => ({ id: d.id, ...d.data() })).find((rate) => rate.enabled !== false);

        if (match) localRate = match;

    }

    catch (error) {

        console.error("Failed to load exchange rate:", error);
        // Non-fatal — the screen just falls back to USD-only display.

    }

}

function localPriceLabel(priceUsd) {

    if (!localRate || !localRate.rateToUsd) return "";

    const converted = priceUsd * Number(localRate.rateToUsd);
    const formatted = converted.toLocaleString(undefined, { maximumFractionDigits: 2 });

    return `≈ ${localRate.symbol || ""}${formatted} ${localRate.currencyCode || ""}`;

}

async function loadPackages() {

    const snap = await getDocs(query(collection(db, "coinPackages"), orderBy("priceUsd", "asc")));

    packages = snap.docs
        .map((d) => ({ id: d.id, ...d.data() }))
        .filter((pkg) => pkg.enabled !== false);

    renderPackages();

}

function renderPackages() {

    const list = document.getElementById("packageList");
    list.innerHTML = "";

    packages.forEach((pkg) => {

        const total = Number(pkg.coins) + Number(pkg.bonus || 0);
        const localLabel = localPriceLabel(pkg.priceUsd);

        const el = document.createElement("div");
        el.className = "glass-card coin-package";
        el.dataset.id = pkg.id;

        el.innerHTML = `
            ${pkg.best ? '<span class="badge-best">Best Value</span>' : ""}
            <span class="coin-package-icon">💜</span>
            <div class="coin-package-text">
                <div class="coin-package-coins">${formatNumber(pkg.coins)} Coins${pkg.bonus ? ` <span style="color:var(--text-faint);font-weight:500">→ ${formatNumber(total)} total</span>` : ""}</div>
                ${pkg.bonus ? `<div class="coin-package-bonus">+${formatNumber(pkg.bonus)} Bonus Coins</div>` : ""}
                ${localLabel ? `<div class="coin-package-bonus" style="color:var(--text-faint)">${localLabel}</div>` : ""}
            </div>
            <div class="coin-package-price">${formatUsd(pkg.priceUsd)}</div>
        `;

        el.addEventListener("click", () => selectPackage(pkg, el));
        list.appendChild(el);

    });

}

function selectPackage(pkg, el) {

    document.querySelectorAll(".coin-package").forEach((n) => n.classList.remove("selected"));
    el.classList.add("selected");

    selectedPackage = pkg;

    const total = Number(pkg.coins) + Number(pkg.bonus || 0);

    document.getElementById("summaryCoins").textContent = formatNumber(pkg.coins);

    const bonusRow = document.getElementById("summaryBonusRow");
    bonusRow.hidden = !pkg.bonus;
    document.getElementById("summaryBonus").textContent = `+${formatNumber(pkg.bonus || 0)}`;

    document.getElementById("summaryTotal").textContent = formatNumber(total);
    document.getElementById("orderSummary").classList.add("show");

    const payBtn = document.getElementById("payBtn");
    payBtn.disabled = false;
    payBtn.style.opacity = "1";
    payBtn.textContent = `Pay ${formatUsd(pkg.priceUsd)}`;

}

function startPayment() {

    if (!currentUser || !selectedPackage) return;

    const payBtn = document.getElementById("payBtn");
    payBtn.disabled = true;
    payBtn.textContent = "Opening Paystack…";

    const handler = PaystackPop.setup({

        key: PAYSTACK_PUBLIC_KEY,
        email: currentUser.email || `${currentUser.uid}@vivy.app`,
        amount: Math.round(selectedPackage.priceUsd * 100), // smallest currency unit
        currency: "USD",
        ref: `vivy_${currentUser.uid}_${Date.now()}`,

        metadata: {
            uid: currentUser.uid,
            packageId: selectedPackage.id,
            country: currentProfile?.country || null,
            exchangeRateUsed: localRate?.rateToUsd || null
        },

        callback: (response) => {

            // The popup completing only means Paystack accepted the card —
            // Coins are never credited from here. handlePaymentSuccess()
            // hands the reference to the Render payment server's
            // POST /verify-payment, which re-verifies it server-side with
            // the SECRET key before crediting anything.
            handlePaymentSuccess(response);

        },

        onClose: () => {

            payBtn.disabled = false;
            payBtn.textContent = `Pay ${formatUsd(selectedPackage.priceUsd)}`;

        }

    });

    handler.openIframe();

}

async function handlePaymentSuccess(response) {

    const payBtn = document.getElementById("payBtn");
    payBtn.textContent = "Verifying payment…";

    try {

        const result = await verifyPaystackTransaction(response.reference);
        const totalCoins = result.totalCoins ?? (Number(selectedPackage.coins) + Number(selectedPackage.bonus || 0));

        const balanceEl = document.getElementById("coinBalanceAmt");
        const current = Number(balanceEl.textContent.replace(/,/g, "")) || 0;
        balanceEl.textContent = formatNumber(current + totalCoins);

        showToast(`+${formatNumber(totalCoins)} coins added!`);

        setTimeout(() => { window.location.href = "wallet.html"; }, 1400);

    }

    catch (error) {

        // A "duplicate" response (the webhook already credited this
        // reference first) still resolves normally above, not as an
        // error — verifyPaystackTransaction() only throws on a genuine
        // failure, so reaching this block means verification truly failed.
        console.error("Payment verification failed:", error);
        showToast("Payment received but verification failed — contact support with your reference.");

    }

    finally {

        payBtn.disabled = false;
        payBtn.textContent = `Pay ${formatUsd(selectedPackage.priceUsd)}`;

    }

}
</script>

</body>
    </html>
