<!-- ======================================================
     Access Denied Notice
     Shown only when someone is bounced off a private Admin
     page (see admin-guard.js). Self-contained: no imports,
     no layout changes, nothing else on this page is touched.
====================================================== -->
<script>
(function () {

    try {

        if (sessionStorage.getItem("vivyAccessDenied") === "1") {

            sessionStorage.removeItem("vivyAccessDenied");

            var toast = document.createElement("div");
            toast.textContent = "Access Denied.";
            toast.style.cssText =
                "position:fixed;left:50%;bottom:32px;transform:translateX(-50%);" +
                "background:rgba(20,14,38,0.95);border:1px solid rgba(255,255,255,0.2);" +
                "color:#fff;padding:12px 20px;border-radius:12px;font-family:'Poppins',sans-serif;" +
                "font-size:0.85rem;font-weight:500;z-index:999;box-shadow:0 10px 30px rgba(0,0,0,0.4);";
            document.body.appendChild(toast);

            setTimeout(function () { toast.remove(); }, 3200);

        }

    }

    catch (error) {

        // sessionStorage unavailable — nothing to show, fail silently.

    }

})();
</script>

</body>
