<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Messages · Vivy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app-shared.css">
<style>
.convo-photo {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
}

.unread-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--secondary);
    flex-shrink: 0;
}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
    <defs><linearGradient id="navGradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7B2FF7"/><stop offset="100%" stop-color="#A855F7"/></linearGradient></defs>
</svg>

<div class="app">

    <header class="app-header">
        <button type="button" class="icon-btn" id="backBtn" aria-label="Go back">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h1 class="page-title">Messages</h1>
    </header>

    <div class="page-content">
        <section class="glass-card animate-in" id="conversationsCard">
            <div id="conversationsList">
                <div class="skeleton-row" style="padding:14px">
                    <div class="skeleton" style="height:46px;border-radius:50%;width:46px;display:inline-block;vertical-align:middle;margin-right:12px"></div>
                </div>
            </div>
        </section>
    </div>

    <nav class="bottom-nav" aria-label="Primary navigation">
        <a href="user-dashboard.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
            <span class="nav-label">Home</span><span class="nav-indicator"></span>
        </a>
        <a href="messages.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span class="nav-label">Messages</span><span class="nav-indicator"></span>
        </a>
        <a href="wallet.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>
            <span class="nav-label">Wallet</span><span class="nav-indicator"></span>
        </a>
        <a href="profile.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="nav-label">Profile</span><span class="nav-indicator"></span>
        </a>
        <a href="support.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 18h.01"/><path d="M9.09 9a3 3 0 1 1 5.83 1c0 2-3 2-3 5"/><circle cx="12" cy="12" r="10"/></svg>
            <span class="nav-label">Support</span><span class="nav-indicator"></span>
        </a>
    </nav>

</div>

<script type="module">
import { authReady } from "./auth-guard.js";
import { db } from "./firebase-config.js";
import { collection, query, where, orderBy, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { goBack } from "./ui-helpers.js";

document.getElementById("backBtn").addEventListener("click", () => goBack("user-dashboard.html"));

init();

async function init() {

    const user = await authReady;
    if (!user) return;

    const listEl = document.getElementById("conversationsList");

    try {

        const snapshot = await getDocs(
            query(
                collection(db, "conversations"),
                where("participants", "array-contains", user.uid),
                orderBy("lastMessageAt", "desc")
            )
        );

        if (snapshot.empty) {

            listEl.innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <p>No conversations yet</p>
                    <p style="font-size:0.7rem">Match with a host to start chatting</p>
                </div>
            `;
            return;

        }

        listEl.innerHTML = "";

        for (const docSnap of snapshot.docs) {

            const convo = docSnap.data();
            const otherUid = (convo.participants || []).find((uid) => uid !== user.uid);

            let hostProfile = {};

            try {

                const hostSnap = await getDoc(doc(db, "hosts", otherUid));
                if (hostSnap.exists()) hostProfile = hostSnap.data();

            }

            catch (e) { /* ignore lookup failure, use fallback text */ }

            const row = document.createElement("a");
            row.className = "list-card";
            row.href = `chat.html?hostUid=${otherUid}`;
            row.innerHTML = `
                <img class="convo-photo" src="${hostProfile.profilePhoto || 'assets/default-avatar.png'}" alt="">
                <div class="list-text">
                    <div class="list-title">${hostProfile.username || "Vivy Host"}</div>
                    <div class="list-subtitle">${convo.lastMessage || "Say hello 👋"}</div>
                </div>
                ${convo.unreadCount?.[user.uid] ? '<span class="unread-dot"></span>' : ""}
            `;
            listEl.appendChild(row);

        }

    }

    catch (error) {

        console.error("Failed to load conversations:", error);

        listEl.innerHTML = `
            <div class="empty-state">
                <p>Couldn't load your messages right now.</p>
            </div>
        `;

    }

}
</script>

</body>
</html>
