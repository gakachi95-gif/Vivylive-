<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Edit Profile | Vivy 💜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app-shared.css">
<style>
.cover-wrap {
    position: relative;
    margin: 16px 16px 0;
    border-radius: var(--r-lg);
    overflow: hidden;
    height: 120px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
}

.cover-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.cover-edit-btn {
    position: absolute;
    bottom: 10px;
    right: 10px;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 0.66rem;
    font-weight: 600;
    padding: 6px 10px;
    border-radius: 999px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
}

.cover-edit-btn svg { width: 12px; height: 12px; stroke: #fff; }

.avatar-wrap {
    position: relative;
    width: 84px;
    height: 84px;
    margin: -42px auto 0;
}

.avatar-photo {
    width: 84px;
    height: 84px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--bg-bottom);
    background: linear-gradient(135deg, var(--primary), var(--secondary));
}

.avatar-edit-btn {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--secondary);
    border: 2px solid var(--bg-bottom);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.avatar-edit-btn svg { width: 13px; height: 13px; stroke: #fff; }

.readonly-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--glass-border);
}

.readonly-row:last-child { border-bottom: none; }

.readonly-row .lbl { font-size: 0.74rem; color: var(--text-dim); }
.readonly-row .val { font-size: 0.8rem; font-weight: 600; text-align: right; }

.lock-icon { width: 13px; height: 13px; stroke: var(--text-faint); }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
    <defs><linearGradient id="navGradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7B2FF7"/><stop offset="100%" stop-color="#A855F7"/></linearGradient></defs>
</svg>

<div class="app" style="max-width:480px;margin:0 auto;position:relative;z-index:1">

    <header class="app-header">
        <button type="button" class="icon-btn" id="backBtn" aria-label="Go back">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div class="page-title">Edit Profile</div>
    </header>

    <div class="cover-wrap animate-in">
        <img class="cover-photo skeleton" id="coverPhoto" src="" alt="">
        <button type="button" class="cover-edit-btn" id="coverEditBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            Edit Cover
        </button>
        <input type="file" id="coverInput" accept="image/*" hidden>
    </div>

    <div class="avatar-wrap animate-in">
        <img class="avatar-photo skeleton" id="avatarPhoto" src="assets/default-avatar.png" alt="">
        <div class="avatar-edit-btn" id="avatarEditBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </div>
        <input type="file" id="avatarInput" accept="image/*" hidden>
    </div>

    <div class="page-content" style="padding-top:14px">

        <form id="profileForm">

            <section class="glass-card animate-in" style="padding:16px;display:flex;flex-direction:column;gap:14px">

                <div class="field-group">
                    <label class="field-label" for="displayNameInput">Display Name</label>
                    <input type="text" id="displayNameInput" class="field-input" maxlength="30" required>
                </div>

                <div class="field-group">
                    <label class="field-label" for="bioInput">Bio</label>
                    <textarea id="bioInput" class="field-input" rows="3" maxlength="200" placeholder="Tell your fans about yourself..."></textarea>
                </div>

                <div class="field-group">
                    <label class="field-label" for="languagesInput">Languages</label>
                    <input type="text" id="languagesInput" class="field-input" placeholder="English, French, Yoruba">
                </div>

                <div class="field-group">
                    <label class="field-label" for="countryInput">Country</label>
                    <input type="text" id="countryInput" class="field-input" placeholder="Nigeria" required>
                </div>

            </section>

            <div class="section-title" style="padding:16px 4px 8px">Account Info</div>

            <section class="glass-card animate-in">
                <div class="readonly-row">
                    <span class="lbl">Host UID</span>
                    <span class="val" id="hostUidVal">—</span>
                </div>
                <div class="readonly-row">
                    <span class="lbl">Agency Name</span>
                    <span class="val" id="agencyNameVal">—</span>
                </div>
                <div class="readonly-row">
                    <span class="lbl">Agency ID</span>
                    <span class="val" id="agencyIdVal">—</span>
                </div>
                <div class="readonly-row">
                    <span class="lbl">Invitation Code</span>
                    <span class="val" id="invitationCodeVal">—</span>
                </div>
            </section>

            <p class="info-note" style="font-size:0.7rem;color:var(--text-faint);padding:10px 4px 0">
                <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Agency assignment is locked — only Vivy Admin can transfer a Host between Agencies.
            </p>

            <button type="submit" class="btn btn-primary-solid btn-block" id="saveBtn" style="margin-top:18px">Save Changes</button>

        </form>

    </div>

    <nav class="bottom-nav" aria-label="Host navigation">
        <a href="host-dashboard.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
            <span class="nav-label">Home</span><span class="nav-indicator"></span>
        </a>
        <a href="host-messages.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span class="nav-label">Messages</span><span class="nav-indicator"></span>
        </a>
        <a href="online-users.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span class="nav-label">Online Users</span><span class="nav-indicator"></span>
        </a>
        <a href="host-wallet.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>
            <span class="nav-label">Wallet</span><span class="nav-indicator"></span>
        </a>
        <a href="host-profile.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="nav-label">Profile</span><span class="nav-indicator"></span>
        </a>
    </nav>

</div>

<script type="module" src="host-profile.js"></script>

</body>
  </html>
