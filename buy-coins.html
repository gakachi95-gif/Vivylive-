<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Buy Coins · Vivy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app-shared.css">
<style>
.balance-strip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
}

.balance-strip .lbl { font-size: 0.76rem; color: var(--text-dim); }
.balance-strip .amt { font-size: 1.1rem; font-weight: 700; color: var(--gold); }

.coin-packages {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.coin-package {
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.14s ease, border-color 0.2s ease;
    position: relative;
}

.coin-package:active { transform: scale(0.96); }

.coin-package.best-value { border-color: var(--gold); }

.badge-best {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: #1a1035;
    font-size: 0.6rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 999px;
}

.coin-package .coin-qty {
    font-size: 1.2rem;
    font-weight: 800;
    color: var(--text);
}

.coin-package .coin-price {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 4px;
}
</style>
</head>
<body>

<div class="app">

    <header class="app-header">
        <button type="button" class="icon-btn" id="backBtn" aria-label="Go back">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h1 class="page-title">Buy Coins</h1>
    </header>

    <section class="glass-card animate-in balance-strip" style="margin:16px 16px 0">
        <span class="lbl">Current Balance</span>
        <span class="amt">💜 <span id="coinBalanceAmt" class="skeleton">0</span></span>
    </section>

    <div class="page-content">

        <div class="coin-packages" id="coinPackages"></div>

        <p style="font-size:0.7rem;color:var(--text-faint);text-align:center;padding:0 8px">
            Payments are simulated in this build. Real payment processing plugs in here later.
        </p>

    </div>

</div>

<script type="module">
import { authReady } from "./auth-guard.js";
import { getCurrentProfile } from "./auth-service.js";
import { db } from "./firebase-config.js";
import { doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { showToast, goBack, formatNumber } from "./ui-helpers.js";

const PACKAGES = [
    { coins: 100, price: 0.99 },
    { coins: 550, price: 4.99 },
    { coins: 1200, price: 9.99, best: true },
    { coins: 2500, price: 19.99 },
    { coins: 6500, price: 49.99 },
    { coins: 14000, price: 99.99 }
];

let currentUser = null;

document.getElementById("backBtn").addEventListener("click", () => goBack("wallet.html"));

renderPackages();
init();

function renderPackages() {

    const container = document.getElementById("coinPackages");

    PACKAGES.forEach((pkg) => {

        const el = document.createElement("div");
        el.className = "glass-card coin-package" + (pkg.best ? " best-value" : "");
        el.innerHTML = `
            ${pkg.best ? '<span class="badge-best">Best Value</span>' : ""}
            <div class="coin-qty">💜 ${formatNumber(pkg.coins)}</div>
            <div class="coin-price">$${pkg.price.toFixed(2)}</div>
        `;
        el.addEventListener("click", () => purchasePackage(pkg, el));
        container.appendChild(el);

    });

}

async function init() {

    currentUser = await authReady;
    if (!currentUser) return;

    try {

        const profile = await getCurrentProfile(currentUser.uid);
        const el = document.getElementById("coinBalanceAmt");
        el.textContent = formatNumber(profile?.coins ?? 0);
        el.classList.remove("skeleton");

    }

    catch (error) {

        console.error("Failed to load coin balance:", error);

    }

}

async function purchasePackage(pkg, el) {

    if (!currentUser) return;

    el.style.pointerEvents = "none";
    el.style.opacity = "0.6";

    try {

        await updateDoc(doc(db, "accounts", currentUser.uid), {
            coins: increment(pkg.coins)
        });

        const balanceEl = document.getElementById("coinBalanceAmt");
        const current = Number(balanceEl.textContent.replace(/,/g, "")) || 0;
        balanceEl.textContent = formatNumber(current + pkg.coins);

        showToast(`+${formatNumber(pkg.coins)} coins added!`);

    }

    catch (error) {

        console.error("Purchase failed:", error);
        showToast("Purchase failed. Please try again.");

    }

    finally {

        el.style.pointerEvents = "";
        el.style.opacity = "";

    }

}
</script>

</body>
</html>
