<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Profile · Vivy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app-shared.css">
<style>
.profile-hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 28px 16px 20px;
    text-align: center;
}

.profile-photo-big-wrap {
    position: relative;
    width: 96px;
    height: 96px;
    cursor: pointer;
}

#bigUserPhoto {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    object-fit: cover;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border: 3px solid rgba(255,255,255,0.18);
}

.photo-edit-badge {
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--secondary);
    border: 2px solid var(--bg-bottom);
    display: flex;
    align-items: center;
    justify-content: center;
}

.photo-edit-badge svg { width: 14px; height: 14px; stroke: #fff; }

.photo-upload-progress {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(15, 11, 29, 0.6);
    border-radius: 50%;
}

.photo-upload-progress svg { width: 60px; height: 60px; transform: rotate(-90deg); }
.photo-upload-progress .progress-track { fill: none; stroke: rgba(255,255,255,0.15); stroke-width: 3; }
.photo-upload-progress .progress-fill {
    fill: none; stroke: var(--secondary); stroke-width: 3; stroke-linecap: round;
    stroke-dasharray: 163; stroke-dashoffset: 163; transition: stroke-dashoffset 0.2s ease;
}

#profileUsername { font-size: 1.15rem; font-weight: 700; }
#profileUid { font-size: 0.76rem; color: var(--text-faint); }

.profile-stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 14px;
}

.profile-stat {
    text-align: center;
    padding: 12px 6px;
}

.profile-stat .num { font-size: 1rem; font-weight: 700; }
.profile-stat .lbl { font-size: 0.68rem; color: var(--text-faint); margin-top: 2px; }

.logout-btn {
    color: var(--danger);
    background: rgba(251, 113, 133, 0.1);
}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
    <defs>
        <linearGradient id="navGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7B2FF7"/>
            <stop offset="100%" stop-color="#A855F7"/>
        </linearGradient>
    </defs>
</svg>

<div class="app">

    <header class="app-header">
        <button type="button" class="icon-btn" id="backBtn" aria-label="Go back">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <h1 class="page-title">Profile</h1>
        <button type="button" class="icon-btn" id="settingsShortcutBtn" aria-label="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
    </header>

    <section class="profile-hero">

        <div class="profile-photo-big-wrap" id="profilePhotoWrap" role="button" aria-label="Change profile photo">
            <img id="bigUserPhoto" class="skeleton" src="" alt="Profile photo">
            <span class="photo-edit-badge">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
            </span>
            <div class="photo-upload-progress" id="photoUploadProgress" hidden>
                <svg viewBox="0 0 40 40">
                    <circle class="progress-track" cx="20" cy="20" r="17"></circle>
                    <circle class="progress-fill" id="photoProgressRing" cx="20" cy="20" r="17"></circle>
                </svg>
            </div>
            <input type="file" id="profilePhotoInput" accept="image/*" hidden>
        </div>

        <h2 id="profileUsername" class="skeleton">Loading…</h2>
        <p id="profileUid" class="skeleton">UID --------</p>

    </section>

    <div class="page-content" style="padding-top:0">

        <section class="glass-card animate-in profile-stats-row">
            <div class="profile-stat">
                <div class="num skeleton" id="statCoins">0</div>
                <div class="lbl">Coins</div>
            </div>
            <div class="profile-stat">
                <div class="num skeleton" id="statCalls">0</div>
                <div class="lbl">Calls Made</div>
            </div>
            <div class="profile-stat">
                <div class="num skeleton" id="statFavorites">0</div>
                <div class="lbl">Favorites</div>
            </div>
        </section>

        <section class="glass-card animate-in" style="animation-delay:0.05s">
            <div class="list-card" id="editUsernameRow">
                <span class="list-icon-circle"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                <div class="list-text">
                    <div class="list-title">Edit username</div>
                    <div class="list-subtitle">Change your display name</div>
                </div>
            </div>
            <a href="wallet.html" class="list-card">
                <span class="list-icon-circle"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg></span>
                <div class="list-text">
                    <div class="list-title">Wallet</div>
                    <div class="list-subtitle">View balance &amp; transactions</div>
                </div>
            </a>
            <a href="favorites.html" class="list-card">
                <span class="list-icon-circle"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.8 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg></span>
                <div class="list-text">
                    <div class="list-title">Favorites</div>
                    <div class="list-subtitle">Hosts you've saved</div>
                </div>
            </a>
            <a href="settings.html" class="list-card">
                <span class="list-icon-circle"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
                <div class="list-text">
                    <div class="list-title">Settings</div>
                    <div class="list-subtitle">Notifications, privacy &amp; more</div>
                </div>
            </a>
        </section>

        <button type="button" class="btn btn-primary-outline logout-btn" id="logoutBtn">Log Out</button>

    </div>

    <nav class="bottom-nav" aria-label="Primary navigation">
        <a href="user-dashboard.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
            <span class="nav-label">Home</span><span class="nav-indicator"></span>
        </a>
        <a href="messages.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span class="nav-label">Messages</span><span class="nav-indicator"></span>
        </a>
        <a href="wallet.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>
            <span class="nav-label">Wallet</span><span class="nav-indicator"></span>
        </a>
        <a href="profile.html" class="nav-item active">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="nav-label">Profile</span><span class="nav-indicator"></span>
        </a>
        <a href="support.html" class="nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 18h.01"/><path d="M9.09 9a3 3 0 1 1 5.83 1c0 2-3 2-3 5"/><circle cx="12" cy="12" r="10"/></svg>
            <span class="nav-label">Support</span><span class="nav-indicator"></span>
        </a>
    </nav>

</div>

<script type="module">
import { authReady } from "./auth-guard.js";
import { getCurrentProfile, logoutUser } from "./auth-service.js";
import { db, storage } from "./firebase-config.js";
import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js";
import { showToast, goBack, formatNumber } from "./ui-helpers.js";

let currentUser = null;

document.getElementById("backBtn").addEventListener("click", () => goBack("user-dashboard.html"));
document.getElementById("settingsShortcutBtn").addEventListener("click", () => window.location.href = "settings.html");

init();

async function init() {

    currentUser = await authReady;
    if (!currentUser) return;

    setupPhotoUpload();
    setupUsernameEdit();

    document.getElementById("logoutBtn").addEventListener("click", async () => {

        if (confirm("Log out of Vivy?")) {
            await logoutUser();
            window.location.href = "login.html";
        }

    });

    try {

        const profile = await getCurrentProfile(currentUser.uid);
        if (!profile) return;

        const photoEl = document.getElementById("bigUserPhoto");
        photoEl.src = profile.profilePhoto || "assets/default-avatar.png";
        photoEl.classList.remove("skeleton");

        const usernameEl = document.getElementById("profileUsername");
        usernameEl.textContent = profile.username || "Vivy User";
        usernameEl.classList.remove("skeleton");

        const uidEl = document.getElementById("profileUid");
        uidEl.textContent = `UID ${currentUser.uid}`;
        uidEl.classList.remove("skeleton");

        setStat("statCoins", profile.coins ?? 0);
        setStat("statCalls", profile.callsMade ?? 0);
        setStat("statFavorites", (profile.favorites || []).length);

    }

    catch (error) {

        console.error("Failed to load profile:", error);

    }

}

function setStat(id, value) {

    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = formatNumber(value);
    el.classList.remove("skeleton");

}

function setupUsernameEdit() {

    document.getElementById("editUsernameRow").addEventListener("click", async () => {

        const current = document.getElementById("profileUsername").textContent;
        const next = prompt("Enter a new username", current === "Loading…" ? "" : current);

        if (!next || !next.trim() || next === current) return;

        try {

            await updateDoc(doc(db, "accounts", currentUser.uid), { username: next.trim() });
            document.getElementById("profileUsername").textContent = next.trim();
            showToast("Username updated");

        }

        catch (error) {

            console.error("Failed to update username:", error);
            showToast("Couldn't update username");

        }

    });

}

function setupPhotoUpload() {

    const wrap = document.getElementById("profilePhotoWrap");
    const input = document.getElementById("profilePhotoInput");
    const progressEl = document.getElementById("photoUploadProgress");
    const ringEl = document.getElementById("photoProgressRing");
    const photoEl = document.getElementById("bigUserPhoto");

    wrap.addEventListener("click", () => input.click());

    input.addEventListener("change", async (event) => {

        const file = event.target.files?.[0];
        event.target.value = "";
        if (!file || !file.type.startsWith("image/")) return;

        const previousSrc = photoEl.src;

        try {

            const blob = await compressImage(file, 800, 800, 0.82);
            progressEl.hidden = false;

            const filePath = `profile-photos/${currentUser.uid}/${Date.now()}.jpg`;
            const storageRef = ref(storage, filePath);
            const uploadTask = uploadBytesResumable(storageRef, blob, { contentType: "image/jpeg" });

            const localUrl = URL.createObjectURL(blob);
            photoEl.src = localUrl;
            photoEl.classList.remove("skeleton");

            await new Promise((resolve, reject) => {

                uploadTask.on("state_changed", (snap) => {

                    const frac = snap.bytesTransferred / snap.totalBytes;
                    const circumference = 106.8;
                    ringEl.style.strokeDashoffset = String(circumference - circumference * frac);

                }, reject, resolve);

            });

            const downloadUrl = await getDownloadURL(uploadTask.snapshot.ref);
            await updateDoc(doc(db, "accounts", currentUser.uid), { profilePhoto: downloadUrl });

            photoEl.src = downloadUrl;
            URL.revokeObjectURL(localUrl);
            showToast("Profile photo updated");

        }

        catch (error) {

            console.error("Photo upload failed:", error);
            photoEl.src = previousSrc;
            showToast("Couldn't upload photo");

        }

        finally {

            progressEl.hidden = true;

        }

    });

}

function compressImage(file, maxWidth, maxHeight, quality) {

    return new Promise((resolve, reject) => {

        const img = new Image();
        const objectUrl = URL.createObjectURL(file);

        img.onload = () => {

            let { width, height } = img;

            if (width > maxWidth || height > maxHeight) {
                const scale = Math.min(maxWidth / width, maxHeight / height);
                width = Math.round(width * scale);
                height = Math.round(height * scale);
            }

            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            canvas.getContext("2d").drawImage(img, 0, 0, width, height);

            canvas.toBlob((blob) => {

                URL.revokeObjectURL(objectUrl);
                blob ? resolve(blob) : reject(new Error("Compression failed"));

            }, "image/jpeg", quality);

        };

        img.onerror = (error) => { URL.revokeObjectURL(objectUrl); reject(error); };
        img.src = objectUrl;

    });

}
</script>

</body>
  </html>
